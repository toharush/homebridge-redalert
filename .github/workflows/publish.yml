name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Check if tag is on main
        id: branch-check
        run: |
          if git merge-base --is-ancestor "${GITHUB_SHA}" origin/main 2>/dev/null; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ steps.branch-check.outputs.on_main }}" == "true" && "$VERSION" != *"-"* ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-"* ]]; then
            echo "tag=${VERSION#*-}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version from release tag
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

      - name: Commit version bump and update tag
        if: steps.branch-check.outputs.on_main == 'true' && !contains(github.ref_name, '-')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main
          git tag -f "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}" --force

      - run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
